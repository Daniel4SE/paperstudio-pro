<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PaperStudio Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              studio: {
                900: 'var(--c-900)',
                800: 'var(--c-800)',
                700: 'var(--c-700)',
                600: 'var(--c-600)',
                border: 'var(--c-border)',
                accent: 'var(--c-accent)',
              }
            },
            fontFamily: {
              mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', "Liberation Mono", "Courier New", 'monospace'],
              sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', "Segoe UI", 'Roboto', "Helvetica Neue", 'Arial', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <style>
      /* Theme CSS variables — toggled by data-theme attribute on <html> */
      :root, [data-theme="dark"] {
        --c-900: #09090b;
        --c-800: #18181b;
        --c-700: #27272a;
        --c-600: #3f3f46;
        --c-border: #27272a;
        --c-accent: #3b82f6;
        --c-text: #e4e4e7;
        --c-text-secondary: #a1a1aa;
        --c-text-muted: #71717a;
        color-scheme: dark;
      }
      [data-theme="light"] {
        --c-900: #ffffff;
        --c-800: #f4f4f5;
        --c-700: #e4e4e7;
        --c-600: #d4d4d8;
        --c-border: #d4d4d8;
        --c-accent: #2563eb;
        --c-text: #18181b;
        --c-text-secondary: #3f3f46;
        --c-text-muted: #71717a;
        color-scheme: light;
      }
    </style>
    <!-- KaTeX for Math -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
    <!-- LaTeX document rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/latex.js/dist/css/latex.min.css">
    <!-- Mermaid for Flowcharts -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.min.js"></script>
    <!-- html2pdf Bundle -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script type="importmap">
{
  "imports": {
    "react-markdown": "https://esm.sh/react-markdown@^10.1.0",
    "remark-math": "https://esm.sh/remark-math@^6.0.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "jszip": "https://esm.sh/jszip@3.10.1",
    "latex.js": "https://esm.sh/latex.js@0.12.6",
    "@codemirror/view": "https://esm.sh/@codemirror/view@6",
    "@codemirror/state": "https://esm.sh/@codemirror/state@6",
    "@codemirror/language": "https://esm.sh/@codemirror/language@6",
    "@codemirror/commands": "https://esm.sh/@codemirror/commands@6",
    "@codemirror/search": "https://esm.sh/@codemirror/search@6",
    "@codemirror/autocomplete": "https://esm.sh/@codemirror/autocomplete@6",
    "@codemirror/lang-css": "https://esm.sh/@codemirror/lang-css@6",
    "@codemirror/legacy-modes/mode/stex": "https://esm.sh/@codemirror/legacy-modes@6/mode/stex",
    "@codemirror/legacy-modes/mode/python": "https://esm.sh/@codemirror/legacy-modes@6/mode/python",
    "@lezer/highlight": "https://esm.sh/@lezer/highlight@1",
    "marked": "https://esm.sh/marked@15",
    "dompurify": "https://esm.sh/dompurify@3",
    "morphdom": "https://esm.sh/morphdom@2",
    "diff": "https://esm.sh/diff@7"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-studio-900 text-zinc-100 antialiased overflow-hidden">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
